# Ultralics website domain checks

name: Check Domains

permissions:
  contents: read

on:
  schedule:
    # Runs every day at 05:00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  Test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        domain:
          [
            "ultralytics.com",
            "ultralytics.co",
            "ultralytics.ai",
            "ultralytics.app",
            "ultralytics.eu",
            "ultralytics.es",
            "ultralytics.us",
            "ultralytics.cn",
            "ultralytics.com.cn",
            "ultralytics.io",
            "ultralytics.net",
            "ultralytics.org",
            "ultralitics.com",
            "ultralytiks.com",
            "ultralyitcs.com",
            "ultralyics.com",
            "ultralytcs.com",
            "ultralytycs.com",
            "ultraltics.com",
            "ultralyctics.com",
            "ultralytix.com",
            "ultralytic.com",
            "ultrlaytics.com",
            "ultraltyics.com",
            "pjreddie.org",
            "pjreddie.net",
            "yolov5.com",
            "yolo11.com",
            "yolo11.ai",
            "yolo11.io",
            "yolo11.net",
            "yolo11.org",
            "yolo14.com",
            "yolo15.com",
            "yolo19.com",
            "yolo-vision.com",
          ]
        prefix: ["www.", ""]
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv pip install --system requests
      - name: Check domain redirections
        shell: python
        run: |
          import time
          from urllib.parse import urlparse

          import requests
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          VALID_DESTINATIONS = {"ultralytics.com", "www.ultralytics.com", "yolo11.com", "www.yolo11.com"}
          REQUEST_TIMEOUT = (10, 20)
          BASE_DELAY = 5
          MAX_DELAY = 120
          USER_AGENT = (
              "Mozilla/5.0 (compatible; UltralyticsDomainCheck/1.0; +https://github.com/ultralytics/docs)"
          )

          def build_session():
              """Create a session with lightweight retries for transient HTTP errors."""
              retry = Retry(
                  total=2,
                  connect=2,
                  read=2,
                  status=2,
                  backoff_factor=1,
                  status_forcelist=(429, 500, 502, 503, 504),
                  allowed_methods=frozenset(["GET"]),
                  raise_on_status=False,
              )
              adapter = HTTPAdapter(max_retries=retry)
              session = requests.Session()
              session.headers.update({"User-Agent": USER_AGENT})
              session.mount("https://", adapter)
              session.mount("http://", adapter)
              return session

          def is_valid_destination(url):
              """Check the final redirect hostname against approved destinations."""
              hostname = (urlparse(url).hostname or "").lower()
              return hostname in VALID_DESTINATIONS

          def check_domain_redirection(domain, prefix, session, max_attempts=5):
              """Check if the given domain redirects correctly, with exponential delays between retries."""
              url = f"https://{prefix}{domain}"
              print(f"\nChecking {url}")

              for attempt in range(max_attempts):
                  response = None
                  try:
                      if attempt > 0:
                          delay = min(BASE_DELAY * (2 ** attempt), MAX_DELAY)  # 10, 20, 40, 80...
                          print(f"Retrying in {delay}s (attempt {attempt + 1}/{max_attempts})")
                          time.sleep(delay)

                      response = session.get(url, allow_redirects=True, timeout=REQUEST_TIMEOUT, stream=True)
                      response.raise_for_status()

                      if is_valid_destination(response.url) and response.status_code == 200:
                          print(f"Success ✅ -> {response.url}")
                          return True

                      print(f"Unexpected final URL: {response.url} (status {response.status_code}) ❌")
                      return False

                  except requests.RequestException as e:
                      print(f"Error: {e}")
                      if attempt == max_attempts - 1:
                          print(f"Failed after {max_attempts} attempts ❌")
                          return False
                  finally:
                      if response is not None:
                          response.close()

              return False

          session = build_session()
          success = check_domain_redirection('${{ matrix.domain }}', '${{ matrix.prefix }}', session)
          session.close()
          if not success:
              raise Exception(f"Domain check failed for ${{ matrix.domain }} with prefix '${{ matrix.prefix }}'")

  Summary:
    runs-on: ubuntu-latest
    needs: [Test]
    if: always()
    steps:
      - name: Check for failure and notify
        if: needs.Test.result == 'failure' && github.repository == 'ultralytics/docs' && (github.event_name == 'schedule' || github.event_name == 'push') && github.run_attempt == '1'
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook-type: incoming-webhook
          webhook: ${{ secrets.SLACK_WEBHOOK_URL_WEBSITE }}
          payload: |
            text: "<!channel> GitHub Actions error for ${{ github.workflow }} ❌\n\n\n*Repository:* https://github.com/${{ github.repository }}\n*Action:* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n*Author:* ${{ github.actor }}\n*Event:* ${{ github.event_name }}\n"
